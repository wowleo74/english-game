let currentWords=[];
let usedWords=[];
let currentWord;
let score=0;
let stars=0;
let questionCount=0;
let wrongWords=[];

function startQuiz(level){
currentWords=words.filter(w=>w.level===level);
usedWords=[];
document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";
score=0;stars=0;questionCount=0;wrongWords=[];
nextQuestion();
}

function nextQuestion(){

questionCount++;

if(questionCount>10){

let wrongList="";

wrongWords.forEach(w=>{
wrongList+=`<div onclick="speakWord('${w}')" style="cursor:pointer;font-size:26px">${w} 🔊</div>`;
});

document.getElementById("quiz").innerHTML=
"<h2>🏁 게임 종료</h2>"+
"<h3>점수 : "+score+"</h3>"+
"<h3>⭐ "+stars+"</h3>"+
"<h3>틀린 단어</h3>"+wrongList+
"<br><button onclick='location.reload()'>다시 시작</button>";

return;
}

document.getElementById("result").innerHTML="";
document.getElementById("info").innerHTML="🎯 "+questionCount+" / 10   ⭐ "+stars+"   점수 "+score;

let available=currentWords.filter(w=>!usedWords.includes(w.word));
currentWord=available[Math.floor(Math.random()*available.length)];
usedWords.push(currentWord.word);

document.getElementById("word").style.color="black";
document.getElementById("word").innerHTML=`<span onclick="speakWord('${currentWord.word}')" style="cursor:pointer">${currentWord.word} 🔊</span>`;

let choices=[currentWord.meaning];

while(choices.length<4){
let m=currentWords[Math.floor(Math.random()*currentWords.length)].meaning;
if(!choices.includes(m)) choices.push(m);
}

choices.sort(()=>Math.random()-0.5);

let html="";

choices.forEach(c=>{
html+=`<button class="choice" onclick="checkAnswer('${c}')">${c}</button>`;
});

document.getElementById("choices").innerHTML=html;

}

function checkAnswer(choice){

if(choice===currentWord.meaning){

score+=10;
stars++;
document.getElementById("word").style.color="green";
document.getElementById("result").innerHTML="🎉 정답!";
playCorrectSound();

}else{

wrongWords.push(currentWord.word);
document.getElementById("word").style.color="red";
document.getElementById("result").innerHTML="❌ 틀렸습니다 (정답:"+currentWord.meaning+")";
playWrongSound();

}

setTimeout(nextQuestion,1000);

}

function speakWord(word){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(word);
msg.lang="en-US";
msg.rate=0.9;
speechSynthesis.speak(msg);
}

function playCorrectSound(){
let a=new AudioContext();
let o=a.createOscillator();
o.frequency.value=800;
o.connect(a.destination);
o.start();
setTimeout(()=>o.stop(),150);
}

function playWrongSound(){
let a=new AudioContext();
let o=a.createOscillator();
o.frequency.value=200;
o.connect(a.destination);
o.start();
setTimeout(()=>o.stop(),300);
}
